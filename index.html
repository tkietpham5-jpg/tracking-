<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang tải...</title>
  <style>
    body { font-family: sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f5f5f5; }
    .box { text-align:center; color:#555; }
    .spinner { width:36px; height:36px; border:3px solid #ddd; border-top-color:#555; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Đang chuyển hướng...</p>
</div>
<script>
// ⚠️ Thay bằng URL Apps Script của bạn (bước 3.5)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSCxGr7C54w0ym69VDgDfTQsnXl0BMY4ga-sGNRoei0XCjQdfbmsE6F_kPh8-RN8Oz/exec";

async function run() {
  const ua = navigator.userAgent;

  let os = "Không rõ";
  if      (/Windows NT 10/.test(ua)) os = "Windows 10/11";
  else if (/Android/.test(ua))       os = "Android " + (ua.match(/Android ([\d.]+)/)?.[1]||"");
  else if (/iPhone|iPad/.test(ua))   os = "iOS";
  else if (/Mac/.test(ua))           os = "macOS";
  else if (/Linux/.test(ua))         os = "Linux";

  let browser = "Không rõ";
  if      (/Edg\//.test(ua))    browser = "Edge";
  else if (/OPR\//.test(ua))    browser = "Opera";
  else if (/Chrome\//.test(ua)) browser = "Chrome " + (ua.match(/Chrome\/([\d]+)/)?.[1]||"");
  else if (/Firefox\//.test(ua))browser = "Firefox";
  else if (/Safari\//.test(ua)) browser = "Safari";

  let device = "Desktop";
  if      (/iPhone/.test(ua))  device = "iPhone";
  else if (/iPad/.test(ua))    device = "iPad";
  else if (/Android.*Mobile/.test(ua)) device = "Android Phone";
  else if (/Android/.test(ua)) device = "Android Tablet";

  const screen = `${window.screen.width}x${window.screen.height}`;

  let ip = "?";
  try { ip = (await (await fetch("https://api.ipify.org?format=json")).json()).ip; } catch(e){}

  const raw = [ua, navigator.language, screen, navigator.hardwareConcurrency, new Date().getTimezoneOffset()].join("|");
  const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
  const fingerprint = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,16);

  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ ip, userAgent:ua, os, browser, device, screen, language:navigator.language, timezone:Intl.DateTimeFormat().resolvedOptions().timeZone, fingerprint })
    });
    const json = await res.json();
    window.location.href = json.redirect || "https://google.com";
  } catch(e) {
    window.location.href = "https://google.com";
  }
}

run();
</script>
</body>
</html>
